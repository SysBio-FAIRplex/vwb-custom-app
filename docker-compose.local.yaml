# Local-testing variant of docker-compose.yaml: identical stack, but with the
# Workbench ${templateOption:*} placeholders replaced by their defaults so a
# bare `docker compose -f docker-compose.local.yaml up --build` works.
# Requires: docker network create app-network
services:
  app:
    container_name: application-server
    build: ./app
    ports:
      # Host port 8081 to avoid clashing with anything already on 8080;
      # inside the container the app still listens on 8080 as Workbench needs.
      - "8081:8080"
    environment:
      QUERY_NODE_URL: http://query-node:8080
      SYNAPSE_DRS_BASE_URL: https://repo-prod.prod.sagebase.org/ga4gh/drs/v1
    volumes:
      - .:/workspace:cached
    depends_on:
      - query-node
    networks:
      - app-network
      - internal

  query-node:
    build: ./query-node
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: amp_data
      AMP_PROGRAMS: AMP-PD,AMP-AD,AMP-RASLE
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: amp_data
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d amp_data"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - internal

volumes:
  pgdata:

networks:
  app-network:
    external: true
  internal:
    driver: bridge
